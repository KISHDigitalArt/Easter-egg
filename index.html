<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Easter Egg</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #fdf4ff; 
            font-family: system-ui, -apple-system, sans-serif;
            overflow-x: hidden; 
            touch-action: manipulation; 
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Animations */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(-5deg); }
            40% { transform: translate(3px, -1px) rotate(5deg); }
            60% { transform: translate(-3px, 1px) rotate(-5deg); }
            80% { transform: translate(3px, 1px) rotate(5deg); }
            100% { transform: translate(1px, -2px) rotate(0deg); }
        }
        .anim-shake { animation: shake 0.4s; }

        @keyframes break-top {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-150px) translateX(50px) rotate(45deg); opacity: 0; }
        }
        .anim-break-top { animation: break-top 1s cubic-bezier(0.25, 1, 0.5, 1) forwards; }

        @keyframes pop-up {
            0% { transform: translateY(80px) scale(0.8); opacity: 0; }
            50% { transform: translateY(-20px) scale(1.05); opacity: 1; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        .anim-bunny-pop {
            animation: pop-up 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 0.2s; 
        }

        @keyframes message-pop {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .anim-message {
            animation: message-pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 0.8s; 
        }

        .hidden-st { display: none !important; }

        .crack {
            stroke-dasharray: 200;
            stroke-dashoffset: 200;
            transition: stroke-dashoffset 0.3s ease-out;
        }
        .crack.visible { stroke-dashoffset: 0; }
    </style>
</head>
<body>

    <div class="container px-4 relative">
        
        <!-- SCREEN 1: SETUP UI (Sender Creates Message & Shares) -->
        <div id="setup-screen" class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 text-center z-10 hidden-st">
            <h1 class="text-3xl font-bold text-purple-600 mb-2">Send a Surprise!</h1>
            <p class="text-gray-600 mb-6">Type a secret message, then choose how to send your interactive egg!</p>
            
            <textarea id="secret-message" rows="3" placeholder="e.g., Happy Easter Grandma! Love you! 🐰💖" 
                class="w-full p-4 border-2 border-purple-200 rounded-xl focus:outline-none focus:border-purple-500 resize-none text-lg mb-6"></textarea>
            
            <div class="flex flex-col gap-3">
                <!-- WhatsApp Button -->
                <button id="btn-whatsapp" class="w-full bg-[#25D366] hover:bg-[#1ebd5b] text-white font-bold py-3 px-4 rounded-xl shadow transition flex items-center justify-center gap-2 text-lg">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
                    Send via WhatsApp
                </button>

                <!-- SMS/iMessage Button -->
                <button id="btn-sms" class="w-full bg-[#007AFF] hover:bg-[#0062cc] text-white font-bold py-3 px-4 rounded-xl shadow transition flex items-center justify-center gap-2 text-lg">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    Send via Text / iMessage
                </button>

                <!-- Native Device Share / Copy Link -->
                <button id="btn-share" class="w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 px-4 rounded-xl shadow transition flex items-center justify-center gap-2 text-lg">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                    More Options / Copy Link
                </button>
            </div>
        </div>

        <!-- SCREEN 2: GAME UI (Recipient Cracks the Egg) -->
        <div id="game-screen" class="hidden-st w-full max-w-lg flex flex-col items-center justify-center relative min-h-[500px]">
            
            <div id="tap-instruction" class="text-2xl font-bold text-purple-500 mb-8 animate-pulse text-center mt-8">
                Someone sent you a surprise!<br>Tap the egg to open it!
            </div>

            <!-- The Final Message Container -->
            <div id="message-container" class="absolute top-12 z-20 transform scale-0 opacity-0 bg-white border-4 border-pink-400 rounded-2xl p-4 shadow-2xl text-center max-w-[90%]">
                <p id="final-text" class="text-xl font-bold text-gray-800 break-words"></p>
                <div class="absolute -bottom-4 left-1/2 transform -translate-x-1/2 w-0 h-0 border-l-[15px] border-l-transparent border-t-[20px] border-t-pink-400 border-r-[15px] border-r-transparent"></div>
            </div>

            <!-- SVG Animation Canvas -->
            <div id="svg-wrapper" class="w-full cursor-pointer relative mt-4">
                <svg viewBox="0 0 400 500" class="w-full h-auto drop-shadow-2xl overflow-visible">
                    
                    <!-- BUNNY -->
                    <g id="bunny" class="transform translate-y-[80px] scale-[0.8] opacity-0" style="transform-origin: 200px 300px;">
                        <path d="M 170 200 C 150 100, 180 80, 190 180" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
                        <path d="M 175 190 C 160 120, 175 110, 185 170" fill="#fbcfe8" />
                        <path d="M 230 200 C 250 100, 220 80, 210 180" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
                        <path d="M 225 190 C 240 120, 225 110, 215 170" fill="#fbcfe8" />
                        <circle cx="200" cy="220" r="50" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
                        <circle cx="185" cy="210" r="5" fill="#1f2937" />
                        <circle cx="215" cy="210" r="5" fill="#1f2937" />
                        <circle cx="183" cy="208" r="1.5" fill="#ffffff" />
                        <circle cx="213" cy="208" r="1.5" fill="#ffffff" />
                        <path d="M 195 220 Q 200 225 205 220" stroke="#f472b6" stroke-width="3" fill="none" stroke-linecap="round"/>
                        <path d="M 200 223 L 200 230" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>
                        <path d="M 190 235 Q 200 240 200 230 Q 200 240 210 235" stroke="#9ca3af" stroke-width="2" fill="none" stroke-linecap="round"/>
                        <circle cx="170" cy="225" r="8" fill="#fbcfe8" opacity="0.6"/>
                        <circle cx="230" cy="225" r="8" fill="#fbcfe8" opacity="0.6"/>
                        <circle cx="150" cy="280" r="15" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
                        <circle cx="250" cy="280" r="15" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
                    </g>

                    <!-- EGG TOP -->
                    <g id="egg-top" style="transform-origin: 200px 300px;">
                        <path d="M 100 300 L 120 280 L 150 310 L 180 270 L 220 320 L 250 280 L 280 310 L 300 300 C 300 150, 270 100, 200 100 C 130 100, 100 150, 100 300 Z" fill="#c084fc" />
                        <path d="M 115 180 Q 200 220 285 180" stroke="#fcd34d" stroke-width="8" fill="none" stroke-linecap="round"/>
                        <circle cx="200" cy="150" r="12" fill="#67e8f9" />
                        <circle cx="150" cy="160" r="8" fill="#67e8f9" />
                        <circle cx="250" cy="160" r="8" fill="#67e8f9" />
                        <path d="M 100 300 L 120 280 L 150 310 L 180 270 L 220 320 L 250 280 L 280 310 L 300 300" stroke="#a855f7" stroke-width="6" fill="none" stroke-linecap="round"/>
                    </g>

                    <!-- EGG BOTTOM -->
                    <g id="egg-bottom">
                        <path d="M 100 300 L 120 280 L 150 310 L 180 270 L 220 320 L 250 280 L 280 310 L 300 300 C 300 420, 260 450, 200 450 C 140 450, 100 420, 100 300 Z" fill="#c084fc" />
                        <path d="M 105 350 L 130 330 L 150 360 L 180 330 L 220 370 L 250 330 L 280 360 L 295 350" stroke="#f472b6" stroke-width="8" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
                        <circle cx="200" cy="400" r="15" fill="#fcd34d" />
                        <circle cx="140" cy="390" r="10" fill="#fcd34d" />
                        <circle cx="260" cy="390" r="10" fill="#fcd34d" />
                        <!-- Cracks -->
                        <path id="crack1" class="crack" d="M 200 450 L 190 410 L 220 380 L 190 350" stroke="#a855f7" stroke-width="4" fill="none" stroke-linejoin="round"/>
                        <path id="crack2" class="crack" d="M 120 400 L 150 380 L 130 350" stroke="#a855f7" stroke-width="3" fill="none" stroke-linejoin="round"/>
                    </g>
                </svg>
            </div>

            <!-- "Create your own" button shown to the receiver at the end -->
            <button id="create-own-btn" class="hidden-st mt-6 bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 px-8 rounded-full shadow transition">
                Create Your Own Surprise Egg!
            </button>

        </div>
    </div>

    <script>
        // DOM Elements
        const setupScreen = document.getElementById('setup-screen');
        const gameScreen = document.getElementById('game-screen');
        
        const messageInput = document.getElementById('secret-message');
        const btnWhatsapp = document.getElementById('btn-whatsapp');
        const btnSms = document.getElementById('btn-sms');
        const btnShare = document.getElementById('btn-share');
        
        const finalText = document.getElementById('final-text');
        const svgWrapper = document.getElementById('svg-wrapper');
        const eggTop = document.getElementById('egg-top');
        const bunny = document.getElementById('bunny');
        const crack1 = document.getElementById('crack1');
        const crack2 = document.getElementById('crack2');
        const messageContainer = document.getElementById('message-container');
        const tapInstruction = document.getElementById('tap-instruction');
        const createOwnBtn = document.getElementById('create-own-btn');

        // Game State
        let clickCount = 0;
        let isBroken = false;
        let receiverMessage = "Happy Easter! 🐰";

        // APP INITIALIZATION: Check if URL has a secret message
        const urlParams = new URLSearchParams(window.location.search);
        const secretCode = urlParams.get('m');

        if (secretCode) {
            // We are the RECEIVER.
            try {
                receiverMessage = decodeURIComponent(escape(window.atob(secretCode)));
            } catch (e) {
                console.error("Could not decode message.");
            }
            finalText.innerText = receiverMessage;
            gameScreen.classList.remove('hidden-st');
        } else {
            // We are the SENDER.
            setupScreen.classList.remove('hidden-st');
        }

        // --- SHARING LOGIC ---

        function generateLink() {
            let userMsg = messageInput.value.trim() || "Happy Easter! 🐰💖";
            // Encode the message
            let encodedMsg = window.btoa(unescape(encodeURIComponent(userMsg)));
            // Create URL without any existing parameters
            let baseUrl = window.location.origin + window.location.pathname;
            return baseUrl + "?m=" + encodedMsg;
        }

        const shareMessageText = "I sent you a surprise Easter Egg! Tap the link to crack it open: ";

        // 1. WhatsApp Share
        btnWhatsapp.addEventListener('click', () => {
            let link = generateLink();
            let text = encodeURIComponent(shareMessageText + "\n\n" + link);
            window.open(`https://wa.me/?text=${text}`, '_blank');
        });

        // 2. SMS / iMessage Share
        btnSms.addEventListener('click', () => {
            let link = generateLink();
            let text = encodeURIComponent(shareMessageText + link);
            // sms: is the universal protocol for opening the text app
            window.open(`sms:?&body=${text}`, '_self');
        });

        // 3. Native Share / Copy Link
        btnShare.addEventListener('click', async () => {
            let link = generateLink();
            
            // Check if device supports native mobile share sheet
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Surprise Easter Egg!',
                        text: shareMessageText,
                        url: link
                    });
                } catch (err) {
                    console.log('User cancelled share');
                }
            } else {
                // If on Desktop, just copy to clipboard
                let tempInput = document.createElement("input");
                tempInput.value = link;
                document.body.appendChild(tempInput);
                tempInput.select();
                document.execCommand("copy");
                document.body.removeChild(tempInput);
                
                let originalText = btnShare.innerHTML;
                btnShare.innerHTML = "✅ Link Copied! Paste it anywhere.";
                setTimeout(() => { btnShare.innerHTML = originalText; }, 3000);
            }
        });

        // --- GAME PLAY LOGIC ---
        
        svgWrapper.addEventListener('click', () => {
            if (isBroken) return; 

            clickCount++;
            svgWrapper.classList.remove('anim-shake');
            void svgWrapper.offsetWidth; 

            if (clickCount === 1) {
                svgWrapper.classList.add('anim-shake');
                crack1.classList.add('visible');
                tapInstruction.innerText = "Keep tapping!";
                tapInstruction.classList.remove('animate-pulse');
            } 
            else if (clickCount === 2) {
                svgWrapper.classList.add('anim-shake');
                crack2.classList.add('visible');
                tapInstruction.innerText = "Almost there! One more!";
            } 
            else if (clickCount >= 3) {
                isBroken = true;
                svgWrapper.classList.add('anim-shake');
                
                tapInstruction.style.opacity = '0'; 
                
                eggTop.classList.add('anim-break-top');
                bunny.classList.add('anim-bunny-pop');
                messageContainer.classList.add('anim-message');

                setTimeout(() => {
                    createOwnBtn.classList.remove('hidden-st');
                }, 2000);
            }
        });

        createOwnBtn.addEventListener('click', () => {
            // Remove the ?m= code to go back to setup screen
            window.location.href = window.location.origin + window.location.pathname;
        });

    </script>
</body>
</html>
